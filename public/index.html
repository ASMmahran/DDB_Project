<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDB Control Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --side: #1e293b; --card: #1e293b; --accent: #38bdf8;
            --success: #10b981; --danger: #ef4444; --text: #f8fafc; --muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        aside { width: 280px; background: var(--side); border-right: 1px solid #334155; display: flex; flex-direction: column; padding: 25px; overflow-y: auto;}
        .logo { font-size: 1.5rem; font-weight: 800; margin-bottom: 40px; color: var(--accent); display: flex; align-items: center; gap: 10px; }
        .node-status { padding: 15px; background: #0f172a; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        .node-status h4 { font-size: 0.75rem; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-weight: 700; font-size: 0.8rem; }
        .Master { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .Slave { background: rgba(56, 189, 248, 0.2); color: var(--accent); }
        .Candidate { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }

        /* Main Content */
        main { flex: 1; overflow-y: auto; padding: 30px; position: relative; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 25px; margin-bottom: 30px; }

        .card { background: var(--card); border-radius: 16px; padding: 24px; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card h3 { margin-bottom: 20px; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 5px; }
        input, select, textarea { 
            width: 100%; background: #0f172a; border: 1px solid #334155; padding: 12px; 
            border-radius: 8px; color: white; font-family: 'Inter', sans-serif; outline: none;
        }
        input:focus, textarea:focus { border-color: var(--accent); }

        .btn-row { display: flex; gap: 10px; }
        button { 
            flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: 600; 
            cursor: pointer; transition: all 0.2s; background: var(--accent); color: #0f172a;
        }
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        button.danger { background: var(--danger); color: white; }

        /* Special Bonus Area */
        .bonus-card { border: 2px solid #7c3aed; background: linear-gradient(145deg, #1e293b, #2e1065); }
        
        /* Terminal & Logs */
        .bottom-shelf { display: grid; grid-template-columns: 1.5fr 1fr; gap: 25px; height: 300px; }
        .terminal { background: #000; border-radius: 12px; padding: 15px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; overflow-y: auto; }
        .log-line { margin-bottom: 4px; }
        .log-info { color: var(--accent); }
        .log-success { color: var(--success); }
        .log-error { color: var(--danger); }
        .peer-item { padding: 4px 0; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; }
        .peer-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

<aside>
    <div class="logo"><span>⚡</span> DDB CLUSTER</div>
    
    <div class="node-status">
        <h4>Node Identity</h4>
        <div id="role-badge" class="badge Slave">Loading...</div>
        <p style="font-size: 0.8rem; margin-top: 10px; color: var(--muted)">ID: <span id="info-id" style="color:white">--</span></p>
        <p style="font-size: 0.8rem; color: var(--muted)">Term: <span id="info-term" style="color:white">--</span></p>
        <p style="font-size: 0.8rem; color: var(--muted)">Leader: <span id="info-leader" style="color:var(--success)">--</span></p>
    </div>

    <div class="node-status">
        <h4>Cluster Peers</h4>
        <div id="cluster-health-container" style="font-size: 0.8rem; display: flex; flex-direction: column; gap: 5px;">
            <div style="color: var(--muted)">Fetching peers...</div>
        </div>
    </div>
</aside>

<main>
    <div class="grid">
        <div class="card">
            <h3>📂 Schema Engine</h3>
            <div class="input-group">
                <label>Database Name</label>
                <input type="text" id="db-name" placeholder="e.g. school">
            </div>
            <div class="btn-row">
                <button onclick="handleAction('/db/create')">Create DB</button>
                <button class="danger" onclick="handleAction('/db/drop')">Drop DB</button>
            </div>
        </div>

        <div class="card">
            <h3>📊 Table Architect</h3>
            <div class="input-group">
                <input type="text" id="table-db" placeholder="Target DB (e.g. school)">
                <input type="text" id="table-name" placeholder="New Table Name (e.g. students)" style="margin-top:10px">
                <textarea id="table-cols" placeholder="Columns (e.g. name, age, email)" style="margin-top:10px; height: 60px;"></textarea>
                <label style="font-size: 0.7rem; margin-top: 5px;">Note: 'id' is created automatically. Separate columns by comma.</label>
            </div>
            <button onclick="createTable()">Construct Table</button>
        </div>

        <div class="card">
            <h3>📝 Data Entry</h3>
            <div class="input-group">
                <input type="text" id="insert-db" placeholder="Target DB (e.g. school)">
                <input type="text" id="insert-table" placeholder="Table Name (e.g. students)" style="margin-top:10px">
                <label style="font-size: 0.7rem; margin-top: 10px;">Record Data (Valid JSON):</label>
                <textarea id="insert-record" placeholder='{"name": "Alice", "age": 22}' style="height: 60px; font-family: monospace;"></textarea>
            </div>
            <button onclick="insertRecord()" style="background: #10b981; color: white;">Insert Record</button>
        </div>

        <div class="card bonus-card">
            <h3 style="color: #a78bfa">🚀 Bonus</h3>
            <div class="input-group">
                <select id="worker-type">
                    <option value="python">Python: Data Analytics Stack</option>
                    <option value="node">Node.js: Encryption Stack</option>
                </select>
                <input type="text" id="special-data" placeholder="Input Data [1,2,3] or String" style="margin-top:10px">
            </div>
            <button style="background: #a78bfa" onclick="runBonus()">Execute Specialized Task</button>
        </div>

        <div class="card" style="grid-column: span 2;">
            <h3>🔍 SQL Commander</h3>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="raw-db" placeholder="DB" style="width: 120px">
                <input type="text" id="raw-query" placeholder="SELECT * FROM students">
                <button onclick="runSQL()" style="width: 150px">Run Query</button>
            </div>
        </div>
    </div>

    <div class="bottom-shelf">
        <div class="terminal" id="output-console">
            <div class="log-line log-info">> DDB System Initialized. Awaiting commands...</div>
        </div>
        <div class="terminal" id="event-log">
            <div class="log-line" style="color: #475569">--- Cluster Event Log ---</div>
        </div>
    </div>
</main>

<script>
    const outConsole = document.getElementById('output-console');
    const eventLog = document.getElementById('event-log');

    function log(msg, type='info') {
        const time = new Date().toLocaleTimeString();
        const div = document.createElement('div');
        div.className = `log-line log-${type}`;
        div.innerHTML = `[${time}] ${msg}`;
        eventLog.prepend(div);
    }

    function setConsole(data) {
        const color = data.error ? '#ef4444' : '#10b981';
        outConsole.innerHTML = `<div class="log-line">> Result Received:</div><pre style="color: ${color}">${JSON.stringify(data, null, 2)}</pre>`;
    }

    async function updateStatus() {
        try {
            const res = await fetch('/node/status');
            const d = await res.json();
            
            // Update node stats
            document.getElementById('role-badge').innerText = d.role;
            document.getElementById('role-badge').className = `badge ${d.role}`;
            document.getElementById('info-id').innerText = d.node_id;
            document.getElementById('info-term').innerText = d.term;
            document.getElementById('info-leader').innerText = d.leader_id || "None";

            // Update cluster visual
            const healthContainer = document.getElementById('cluster-health-container');
            let healthHTML = '';
            
            if (d.peers && d.peers.length > 0) {
                d.peers.forEach(peer => {
                    // Check if peer string contains the leader ID
                    const isLeaderPeer = d.leader_id && peer.includes(d.leader_id);
                    healthHTML += `
                        <div class="peer-item">
                            <span style="word-break: break-all; max-width: 80%;">${peer}</span> 
                            <span class="status-dot" style="color: ${isLeaderPeer ? 'var(--success)' : 'var(--muted)'}" title="${isLeaderPeer ? 'Master' : 'Peer'}">●</span>
                        </div>`;
                });
            } else {
                healthHTML = '<div style="color: var(--muted)">No peers configured</div>';
            }
            healthContainer.innerHTML = healthHTML;

        } catch(e) {
            document.getElementById('role-badge').innerText = "Offline";
            document.getElementById('role-badge').className = `badge danger`;
        }
    }

    async function handleAction(path) {
        const db = document.getElementById('db-name').value;
        if (!db) return log(`Error: Database name cannot be empty`, 'error');
        
        log(`Requesting ${path} for ${db}...`);
        try {
            const res = await fetch(path, { method: 'POST', body: JSON.stringify({ db }) });
            const data = await res.json();
            setConsole(data);
            if(!data.error) log(`Success: ${db} processed.`, 'success');
            else log(`Error: ${data.error}`, 'error');
        } catch(e) {
            log(`Network Error: Failed to reach backend`, 'error');
        }
    }

    async function createTable() {
        const db = document.getElementById('table-db').value;
        const table = document.getElementById('table-name').value;
        const columnsStr = document.getElementById('table-cols').value;
        
        if (!db || !table) return log(`Error: DB and Table names are required`, 'error');

        // FIX: Go backend expects an array of strings called 'attributes', not a single string called 'columns'
        const attributes = columnsStr.split(',').map(s => s.trim()).filter(s => s !== "");

        try {
            const res = await fetch('/table/create', { method: 'POST', body: JSON.stringify({ db, table, attributes }) });
            const data = await res.json();
            setConsole(data);
            if (!data.error) log(`Table ${table} architected.`, 'success');
            else log(`Error: ${data.error}`, 'error');
        } catch (e) {
            log(`Network Error: Failed to create table`, 'error');
        }
    }

    // NEW DATA ENTRY LOGIC
    async function insertRecord() {
        const db = document.getElementById('insert-db').value;
        const table = document.getElementById('insert-table').value;
        const recordStr = document.getElementById('insert-record').value;
        
        if (!db || !table || !recordStr) {
            return log(`Error: DB, Table, and Record JSON are required`, 'error');
        }

        let record;
        try {
            // Convert the text input into a real JavaScript object
            record = JSON.parse(recordStr);
        } catch (e) {
            return log(`Error: Record data must be strictly valid JSON (use double quotes around keys)`, 'error');
        }

        log(`Inserting record into ${db}.${table}...`);
        try {
            const res = await fetch('/query/insert', { 
                method: 'POST', 
                body: JSON.stringify({ db, table, record }) 
            });
            const data = await res.json();
            setConsole(data);
            
            if (!data.error) {
                log(`Success: Record inserted into ${table}.`, 'success');
                document.getElementById('insert-record').value = ''; 
            } else {
                log(`Insert Error: ${data.error}`, 'error');
            }
        } catch (e) {
            log(`Network Error: Failed to insert record`, 'error');
        }
    }

    async function runSQL() {
        const db = document.getElementById('raw-db').value;
        const sql = document.getElementById('raw-query').value;
        if (!db || !sql) return log(`Error: DB and SQL query are required`, 'error');

        try {
            const res = await fetch('/query/raw', { method: 'POST', body: JSON.stringify({ db, sql }) });
            const data = await res.json();
            setConsole(data);
            if (!data.error) log(`SQL Query executed on ${db}.`, 'info');
            else log(`SQL Error: ${data.error}`, 'error');
        } catch (e) {
             log(`Network Error: Failed to execute query`, 'error');
        }
    }

    async function runBonus() {
        const type = document.getElementById('worker-type').value;
        let payload = document.getElementById('special-data').value;
        if (!payload) return log(`Error: Please enter payload data`, 'error');

        if(type === 'python') try { payload = JSON.parse(payload); } catch(e){}

        log(`Routing to ${type.toUpperCase()} worker...`, 'info');
        try {
            const res = await fetch('/special/task', { method: 'POST', body: JSON.stringify({ type, payload }) });
            const data = await res.json();
            setConsole(data);
            if (!data.error) log(`Bonus task complete using ${data.stack || 'worker'}`, 'success');
            else log(`Worker Error: ${data.error}`, 'error');
        } catch (e) {
            log(`Network Error: Failed to connect to worker`, 'error');
        }
    }

    // Refresh every 2 seconds
    setInterval(updateStatus, 2000);
    updateStatus();
</script>

</body>
</html>
