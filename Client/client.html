<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Data Entry | DDB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; display: flex; justify-content: center; padding: 40px; }
        .card { background: #1e293b; border-radius: 16px; padding: 30px; width: 100%; max-width: 500px; border: 1px solid #334155; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; color: #38bdf8; display: flex; align-items: center; gap: 10px;}
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 8px; }
        input, textarea { width: 100%; background: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 8px; color: white; font-family: inherit; outline: none; box-sizing: border-box; }
        input:focus, textarea:focus { border-color: #38bdf8; }
        button { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; background: #10b981; color: white; font-size: 1rem; transition: 0.2s; }
        button:hover { background: #059669; transform: translateY(-2px); }
        #console { margin-top: 20px; padding: 15px; background: #000; border-radius: 8px; font-family: monospace; font-size: 0.85rem; min-height: 60px; color: #a3a3a3; word-wrap: break-word; }
    </style>
</head>
<body>

    <div class="card">
        <h2>📡 Remote Data Client</h2>
        
        <div class="input-group">
    <label>API Gateway URL</label>
    <input type="text" id="master-url" value="http://192.168.1.20:9000">
</div>

        <div class="input-group">
            <label>Database Name</label>
            <input type="text" id="db" placeholder="e.g. school">
        </div>

        <div class="input-group">
            <label>Table Name</label>
            <input type="text" id="table" placeholder="e.g. students">
        </div>

        <div class="input-group">
            <label>Record Data (Valid JSON)</label>
            <textarea id="record" placeholder='{"name": "Alice", "age": 22}' style="height: 80px;"></textarea>
        </div>

        <button onclick="sendData()">Send to Cluster</button>

        <div id="console">> Ready to transmit...</div>
    </div>

    <script>
        const out = document.getElementById('console');

        async function sendData() {
            const url = document.getElementById('master-url').value;
            const db = document.getElementById('db').value;
            const table = document.getElementById('table').value;
            const recordStr = document.getElementById('record').value;

            if (!url || !db || !table || !recordStr) {
                out.style.color = "#ef4444";
                return out.innerText = "> Error: All fields are required.";
            }

            let record;
            try {
                record = JSON.parse(recordStr);
            } catch (e) {
                out.style.color = "#ef4444";
                return out.innerText = "> Error: Invalid JSON formatting.";
            }

            out.style.color = "#38bdf8";
            out.innerText = `> Transmitting to ${url}...`;

            try {
                // Notice we append /query/insert to the Master URL
                const res = await fetch(url + '/query/insert', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ db, table, record })
                });

                const data = await res.json();
                
                if (!data.error) {
                    out.style.color = "#10b981";
                    out.innerText = `> Success: Record saved to ${db}.${table}\n> Server Response: ${JSON.stringify(data)}`;
                    document.getElementById('record').value = ''; // Clear input on success
                } else {
                    out.style.color = "#ef4444";
                    out.innerText = `> Server Error: ${data.error}`;
                }
            } catch (error) {
               out.style.color = "#ef4444";
                // This will now print the EXACT error from the browser
                out.innerText = `> Network Error: ${error.message}\n> Could not connect to ${url}. Make sure the Gateway is running.`;
            }
        }
    </script>
</body>
</html>
